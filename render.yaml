services:
  - type: web
    name: authlab-backend
    env: python
    plan: starter
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MISTRAL_API_KEY
        sync: false
      - key: MISTRAL_MODEL
        value: mistral-small-latest
      - key: MISTRAL_BASE_URL
        value: https://api.mistral.ai/v1/chat/completions
      - key: SIGNING_SECRET
        sync: false
